<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- auwe 墨章：墨色印章 + 几何单层 a（纸色）。墨 #232b28 = app 的 foreground token（oklch 0.28 0.012 170）。
       暗色环境翻转为纸底墨字（支持该媒体查询的浏览器生效，其余保持墨章，纸色字母自带对比）。
       注意：XML 注释内不能出现连续两个连字符。 -->
  <style>
    .bg { fill: #232b28; }
    .fg { fill: none; stroke: #ffffff; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #ffffff; }
      .fg { stroke: #232b28; }
    }
  </style>
  <rect class="bg" x="4" y="4" width="92" height="92" rx="22"/>
  <circle class="fg" cx="45" cy="58" r="15.5" stroke-width="11"/>
  <line class="fg" x1="66.5" y1="42" x2="66.5" y2="73" stroke-width="11" stroke-linecap="round"/>
</svg>
